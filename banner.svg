<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" width="900" height="260">
<defs>
<style>
  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-9px); }
  }
  @keyframes burnOuter {
    0%   { transform: scaleX(1)    scaleY(1);    opacity:.92; }
    50%  { transform: scaleX(.82)  scaleY(1.14); opacity:.85; }
    100% { transform: scaleX(1.12) scaleY(.93);  opacity:.95; }
  }
  @keyframes burnInner {
    0%   { transform: scaleX(.72) scaleY(1);    opacity:1;   }
    50%  { transform: scaleX(.58) scaleY(1.18); opacity:.88; }
    100% { transform: scaleX(.82) scaleY(.9);   opacity:.96; }
  }
  @keyframes particle {
    0%   { opacity:.85; transform: translateY(0px)   scale(1);   }
    100% { opacity:0;   transform: translateY(32px)  scale(.25); }
  }
  @keyframes twinkA {
    0%,100% { opacity:.15; } 50% { opacity:1; }
  }
  @keyframes twinkB {
    0%,100% { opacity:.8; }  50% { opacity:.12; }
  }
  @keyframes twinkC {
    0%,100% { opacity:.4; }  50% { opacity:.95; }
  }
  @keyframes glowPulse {
    0%,100% { opacity:.45; } 50% { opacity:.85; }
  }
  @keyframes orbitSpin {
    from { transform: rotate(0deg);   }
    to   { transform: rotate(360deg); }
  }
  @keyframes scanMove {
    0%   { transform: translateY(-50px); opacity:0; }
    8%   { opacity:.12; }
    92%  { opacity:.12; }
    100% { transform: translateY(310px); opacity:0; }
  }

  .rocketG      { animation: float     3.2s ease-in-out infinite; transform-origin: 760px 148px; }
  .fOuter       { animation: burnOuter  .13s ease-in-out infinite alternate; transform-origin: 760px 192px; }
  .fMid         { animation: burnOuter  .13s ease-in-out infinite alternate .04s; transform-origin: 760px 192px; }
  .fInner       { animation: burnInner  .16s ease-in-out infinite alternate; transform-origin: 760px 192px; }
  .p1 { animation: particle .55s ease-out infinite;       }
  .p2 { animation: particle .55s ease-out infinite .11s;  }
  .p3 { animation: particle .55s ease-out infinite .22s;  }
  .p4 { animation: particle .55s ease-out infinite .33s;  }
  .p5 { animation: particle .55s ease-out infinite .44s;  }
  .sA { animation: twinkA 1.9s ease-in-out infinite;      }
  .sB { animation: twinkA 2.4s ease-in-out infinite .5s;  }
  .sC { animation: twinkA 1.6s ease-in-out infinite .9s;  }
  .sD { animation: twinkB 2.8s ease-in-out infinite .2s;  }
  .sE { animation: twinkB 2.0s ease-in-out infinite .7s;  }
  .sF { animation: twinkC 1.7s ease-in-out infinite .4s;  }
  .eGlow        { animation: glowPulse  2s   ease-in-out infinite; }
  .orbitRing    { animation: orbitSpin 14s   linear     infinite; transform-origin: 128px 128px; }
  .scan         { animation: scanMove   7s   linear     infinite; }
</style>

<!-- ── Gradients ── -->
<radialGradient id="bgG"   cx="55%" cy="45%" r="75%">
  <stop offset="0%"   stop-color="#0d1b2a"/>
  <stop offset="100%" stop-color="#060d1a"/>
</radialGradient>
<linearGradient id="bodyG" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#1e3a5f"/>
  <stop offset="40%"  stop-color="#2d5986"/>
  <stop offset="60%"  stop-color="#2d5986"/>
  <stop offset="100%" stop-color="#1a3050"/>
</linearGradient>
<linearGradient id="noseG" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%"   stop-color="#e2e8f0"/>
  <stop offset="100%" stop-color="#94a3b8"/>
</linearGradient>
<linearGradient id="flmO"  x1="0%" y1="0%" x2="0%" y2="100%">
  <stop offset="0%"   stop-color="#facc15"/>
  <stop offset="45%"  stop-color="#fb923c"/>
  <stop offset="100%" stop-color="#ef4444" stop-opacity=".3"/>
</linearGradient>
<linearGradient id="flmI"  x1="0%" y1="0%" x2="0%" y2="100%">
  <stop offset="0%"   stop-color="#fef9c3"/>
  <stop offset="55%"  stop-color="#facc15"/>
  <stop offset="100%" stop-color="#fb923c" stop-opacity=".4"/>
</linearGradient>
<radialGradient id="winG"  cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#7dd3fc"/>
  <stop offset="60%"  stop-color="#00b4d8"/>
  <stop offset="100%" stop-color="#0369a1"/>
</radialGradient>
<radialGradient id="plnG"  cx="32%" cy="32%" r="68%">
  <stop offset="0%"   stop-color="#1e40af"/>
  <stop offset="68%"  stop-color="#1e3a8a"/>
  <stop offset="100%" stop-color="#0f172a"/>
</radialGradient>
<radialGradient id="engG"  cx="50%" cy="0%" r="100%">
  <stop offset="0%"   stop-color="#fb923c" stop-opacity=".55"/>
  <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
</radialGradient>
<filter id="gFx" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="3.5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="tFx" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<clipPath id="clip">
  <rect width="900" height="260" rx="14"/>
</clipPath>
</defs>

<!-- BG -->
<rect width="900" height="260" rx="14" fill="url(#bgG)"/>

<g clip-path="url(#clip)">

<!-- Scanline sweep -->
<rect class="scan" x="0" y="-50" width="900" height="45" fill="rgba(0,180,216,.04)"/>

