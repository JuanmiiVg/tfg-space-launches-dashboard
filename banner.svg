<text x="568" y="230" font-family="'Courier New',monospace" font-size="15" font-weight="700" fill="#4ade80">$0</text>
<text x="585" y="230" font-family="Arial,sans-serif"        font-size="10.5" fill="#64748b">/mes</text>

<!-- ── Rocket (animated group) ── -->
<g class="rocketG">

  <!-- Engine exhaust glow halo -->
  <ellipse class="eGlow" cx="760" cy="193" rx="24" ry="11" fill="url(#engG)"/>

  <!-- Flame particles trail -->
  <circle class="p1" cx="754" cy="196" r="2.8" fill="#facc15"/>
  <circle class="p2" cx="761" cy="199" r="2.2" fill="#fb923c"/>
  <circle class="p3" cx="767" cy="197" r="1.8" fill="#fb923c"/>
  <circle class="p4" cx="757" cy="201" r="1.6" fill="#ef4444"/>
  <circle class="p5" cx="763" cy="198" r="2"   fill="#fbbf24"/>

  <!-- Outer flame -->
  <g class="fOuter">
    <path d="M747,192 Q742,212 751,228 Q760,238 760,238 Q760,238 769,228 Q778,212 773,192 Z"
          fill="url(#flmO)" opacity=".88"/>
  </g>
  <!-- Mid flame -->
  <g class="fMid">
    <path d="M751,192 Q748,208 755,221 Q760,230 760,230 Q760,230 765,221 Q772,208 769,192 Z"
          fill="#fb923c" opacity=".82"/>
  </g>
  <!-- Inner flame (white-hot core) -->
  <g class="fInner">
    <path d="M755,192 Q753,205 757,215 Q760,222 760,222 Q760,222 763,215 Q767,205 765,192 Z"
          fill="url(#flmI)" opacity="1"/>
  </g>

  <!-- Fins -->
  <path d="M740,172 L730,198 L748,193 Z" fill="#1e3a5f" stroke="#2d5986" stroke-width=".8"/>
  <path d="M780,172 L790,198 L772,193 Z" fill="#1e3a5f" stroke="#2d5986" stroke-width=".8"/>
  <path d="M749,186 L743,197 L749,192 Z" fill="#162d4a"/>
  <path d="M771,186 L777,197 L771,192 Z" fill="#162d4a"/>

  <!-- Body -->
  <rect x="740" y="98" width="40" height="94" rx="6" fill="url(#bodyG)"/>

  <!-- Body panel lines -->
  <line x1="744" y1="124" x2="776" y2="124" stroke="#2d5986" stroke-width=".8" opacity=".55"/>
  <line x1="744" y1="148" x2="776" y2="148" stroke="#2d5986" stroke-width=".8" opacity=".55"/>
  <line x1="744" y1="168" x2="776" y2="168" stroke="#2d5986" stroke-width=".8" opacity=".55"/>

  <!-- Nose cone -->
  <path d="M740,98 Q740,56 760,42 Q780,56 780,98 Z" fill="url(#noseG)"/>
  <!-- Nose shading -->
  <path d="M740,98 Q740,56 760,42 Q750,58 748,98 Z" fill="rgba(0,0,0,.14)"/>

  <!-- Porthole window -->
  <circle cx="760" cy="126" r="14" fill="#0c1a2e" stroke="#2d5986" stroke-width="1.5"/>
  <circle cx="760" cy="126" r="10.5" fill="url(#winG)" opacity=".92" filter="url(#gFx)"/>
  <!-- Window highlight -->
  <ellipse cx="755" cy="121" rx="4.5" ry="2.8" fill="rgba(255,255,255,.32)"
           transform="rotate(-28,755,121)"/>

  <!-- Flag stripes (decorative) -->
  <rect x="742" y="154" width="36" height="3"  rx="1.5" fill="#ef4444" opacity=".65"/>
  <rect x="742" y="159" width="36" height="3"  rx="1.5" fill="#ffffff" opacity=".45"/>
  <rect x="742" y="164" width="36" height="3"  rx="1.5" fill="#3b82f6" opacity=".65"/>

  <!-- Engine nozzle bell -->
  <path d="M747,192 L742,202 L778,202 L773,192 Z" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <ellipse cx="760" cy="202" rx="18" ry="4.5" fill="#1e293b" stroke="#334155" stroke-width=".8"/>

</g>

