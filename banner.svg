<text x="290" y="128"
      font-family="'Courier New', Courier, monospace"
      font-size="19" font-weight="700" letter-spacing="2.5"
      fill="#e2e8f0" opacity=".92">Intelligence Platform</text>

<!-- Divider -->
<line x1="290" y1="141" x2="630" y2="141" stroke="#1e3a5f" stroke-width="1"/>

<!-- Badges -->
