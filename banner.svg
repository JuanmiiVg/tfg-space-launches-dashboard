<!-- ── Planet ── -->
<circle cx="128" cy="128" r="56" fill="url(#plnG)" opacity=".88"/>
<!-- surface detail -->
<ellipse cx="112" cy="113" rx="13" ry="8"  fill="#1e3a8a" opacity=".55"/>
<ellipse cx="148" cy="143" rx="9"  ry="5.5" fill="#1e3a8a" opacity=".45"/>
