<ellipse cx="113" cy="106" rx="19" ry="10" fill="rgba(147,197,253,.13)"/>
<!-- rings (static, subtle) -->
<ellipse cx="128" cy="128" rx="82" ry="19" fill="none" stroke="#60a5fa" stroke-width="1.4" opacity=".28" transform="rotate(-14,128,128)"/>
<ellipse cx="128" cy="128" rx="73" ry="14" fill="none" stroke="#93c5fd" stroke-width=".7"  opacity=".16" transform="rotate(-14,128,128)"/>

<!-- orbit ring with satellite -->
<g class="orbitRing">
  <ellipse cx="128" cy="128" rx="82" ry="19" fill="none" stroke="#00b4d8"
           stroke-width=".9" stroke-dasharray="5 9" opacity=".48"
           transform="rotate(-14,128,128)"/>
  <circle cx="209" cy="124" r="3.2" fill="#00b4d8" opacity=".85" filter="url(#gFx)"/>
</g>

<!-- horizon glow -->
<ellipse cx="128" cy="158" rx="62" ry="14" fill="rgba(0,180,216,.07)"/>

<!-- ── Text block ── -->
